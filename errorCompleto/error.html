<!DOCTYPE html>
<html>
<head>
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
  <style>
    :root {
      --colorTextoBlanco: #ffffff;
      --colorInicial: rgba(65, 128, 175, 0.3);
      --colorInicialOpaco: #153658;
      --colorSecundario: #86D597;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--colorInicialOpaco);
      min-height: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo{
      display: flex;
      margin-right: 4rem;
      margin-bottom: 2rem;
    }
    .card {
      background: var(--colorInicial);
      border: 1px solid var(--colorSecundario);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    .error-titulo {
      color: var(--colorSecundario);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .title {
      color: var(--colorTextoBlanco);
      font-size: 18px;
      font-weight: 500;
      line-height: 1.5;
      margin-bottom: 1.25rem;
    }

    .linea {
      width: 40px;
      height: 2px;
      background: var(--colorSecundario);
      margin: 0 auto 1.25rem;
      border-radius: 2px;
    }

    .desc {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="logo"><img src="logo_blanco.png" alt="logo-amadeus" width="50rem" height="auto"></div>
  <br>
  <br>
  <div class="card">
    <div class="error-titulo">Error</div>
    <h1 class="title">Por favor, vuelva más tarde.<br>Lo solucionaremos lo antes posible.</h1>
      <div class="linea"></div>
    <p class="desc">Perdone las molestias.</p>
  </div>
</body>
</html>
